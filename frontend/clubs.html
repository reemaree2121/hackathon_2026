<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clubs — Freshers Portal</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="./chatbot/chatbot.css" />
</head>
<body>
<div class="navbar">
  <span class="brand"><span class="brand-mark">🎓</span> Freshers Portal</span>
  <div class="navbar-links">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="resources.html">📚 Resources</a>
    <a href="events.html">🎉 Events</a>
    <a href="timetable.html">🗓️ Timetable</a>
    <a href="clubs.html" class="active">🌟 Clubs</a>
    <a href="seniors.html">🎓 Seniors</a>
    <a href="campus.html">📍 Campus</a>
  </div>
  <a href="#" class="logout-link" onclick="clearToken(); window.location.href='index.html';">Logout</a>
</div>

<div class="container">
  <div class="page-header">
    <div>
      <h2>🌟 Campus Clubs</h2>
      <p class="page-subtitle">Find a community that matches your interests.</p>
    </div>
    <select id="domain-filter" onchange="loadClubs()" style="max-width:220px; margin-bottom:0;">
      <option value="">All Domains</option>
    </select>
  </div>
  <div class="grid" id="clubs-list">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
requireLoginOrRedirect();

async function loadDomains() {
  try {
    const domains = await apiRequest('/domains');
    const select = document.getElementById('domain-filter');
    domains.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.name;
      opt.textContent = d.name;
      select.appendChild(opt);
    });
  } catch (err) {
    console.error('Failed to load domains', err);
  }
}

async function loadClubs() {
  const domain = document.getElementById('domain-filter').value;
  const query = domain ? `?domain=${encodeURIComponent(domain)}` : '';
  try {
    const clubs = await apiRequest(`/clubs${query}`);
    document.getElementById('clubs-list').innerHTML = clubs.length ? clubs.map(c => `
      <div class="card card-interactive">
        <h3>${c.name}</h3>
        <span class="badge">${c.domain || '—'}</span>
        <p style="margin-top: 15px;">${c.description || ''}</p>
        <a class="btn" href="mailto:${c.contact_email}" style="display: inline-block; margin-top: 15px;">Contact</a>
      </div>
    `).join('') : '<div class="card"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No clubs found</div><div class="empty-hint">Try a different domain filter.</div></div></div>';
  } catch (err) {
    document.getElementById('clubs-list').textContent = 'Failed to load: ' + err.message;
  }
}

loadDomains();
loadClubs();
</script>
<script type="module">
  import { CampusChatbot } from './chatbot/chatbot.js';
  document.addEventListener('DOMContentLoaded', () => {
    CampusChatbot.init({
      provider: 'gemini',
      activePage: 'Clubs',
      theme: 'light',
      userProfile: { name: 'Rahul Verma', studentId: '2024-CS-042', department: 'Computer Science' }
    });
  });
</script>
</body>
</html>
